name: dictation_app
description: A mobile dictation app with overlay functionality
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.0.0
  clipboard: ^0.1.3
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  dartz: ^0.10.1
  equatable: ^2.0.5
  flutter_overlay_window: ^0.5.0
  tflite_flutter: ^0.11.0
  flutter_local_notifications: ^17.2.2
  http: ^1.1.0
  
  # Text Input
  flutter_background_service: ^5.0.5
  device_info_plus: ^11.4.0
  
  # Dependency Injection
  logger: ^2.0.2+1

  # TensorFlow Lite
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/dictionaries/

